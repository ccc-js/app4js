<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editor4</title>
<link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css">
<style>
  html, body { margin:0; height:100%; overflow:hidden; font-family:sans-serif; background:#1e1e1e; color:#d4d4d4; }
  body { display:flex; }
  #sidebar { width:200px; border-right:1px solid #3c3c3c; height:100%; background:#252526; display:flex; flex-direction:column; overflow-y:auto; }
  #sidebar .sidebar-item { padding:5px 10px; cursor:pointer; color:#ccc; }
  #sidebar .sidebar-item:hover { background:#2a2d2e; }
  #content { flex:1; display:flex; flex-direction:column; min-height:0; }
  #editor { flex:1; padding:10px; overflow:auto; background:#1e1e1e; color:#d4d4d4; border:none; resize:none; font-family:Menlo, Monaco, monospace; white-space:pre; outline:none; }
  #terminal-container { height:200px; min-height:200px; background:#1e1e1e; border-top:1px solid #3c3c3c; }
</style>
</head>
<body>

<div id="sidebar"></div>
<div id="content">
  <textarea id="editor"></textarea>
  <div id="terminal-container"></div>
</div>

<script>
const { ipcRenderer } = require('electron');

let currentPath = null;
let currentFile = null;

function updateSidebar(items) {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  items.forEach(name => {
    const el = document.createElement('div');
    el.className = 'sidebar-item';
    el.textContent = name;
    el.dataset.name = name;
    el.onclick = () => {
      if (name === '..') {
        const parent = currentPath ? currentPath.split('/').slice(0, -1).join('/') || '' : '';
        loadDirectory(parent);
      } else {
        loadItem(name);
      }
    };
    sidebar.appendChild(el);
  });
}

async function loadDirectory(dir) {
  try {
    const entries = await ipcRenderer.invoke('fs:readdir', dir);
    const dirs = entries.filter(e => e.isDirectory).map(e => e.name);
    const files = entries.filter(e => e.isFile).map(e => e.name);
    currentPath = dir;
    updateSidebar([...dirs, ...files, '..']);
  } catch (e) { console.error(e); }
}

async function loadItem(name) {
  const fullPath = currentPath ? `${currentPath}/${name}` : name;
  try {
    const result = await ipcRenderer.invoke('fs:stat', fullPath);
    if (result.isDirectory) {
      loadDirectory(fullPath);
    } else {
      const content = await ipcRenderer.invoke('fs:readFile', fullPath);
      document.getElementById('editor').value = content;
      currentFile = fullPath;
    }
  } catch (e) { console.error(e); }
}

window.openFolder = async () => {
  const result = await ipcRenderer.invoke('dialog:openDirectory');
  if (!result.canceled) {
    const folder = result.filePaths[0];
    const list = await readFolderRecursive(folder, 0);
    document.getElementById('editor').value = list;
  }
};

async function readFolderRecursive(dir, depth) {
  const entries = await ipcRenderer.invoke('fs:readdir', dir);
  const indent = '  '.repeat(depth);
  let output = '';
  for (const entry of entries.sort((a, b) => a.name.localeCompare(b.name))) {
    if (entry.isDirectory) {
      output += indent + '\uD83D\uDCC1 ' + entry.name + '\n';
      output += await readFolderRecursive(`${dir}/${entry.name}`, depth + 1);
    } else {
      output += indent + '\uD83D\uDCC4 ' + entry.name + '\n';
    }
  }
  return output;
}

window.saveFile = async () => {
  if (currentFile) {
    await ipcRenderer.invoke('fs:writeFile', currentFile, document.getElementById('editor').value);
  } else {
    const result = await ipcRenderer.invoke('dialog:saveFile');
    if (!result.canceled) {
      currentFile = result.filePaths[0];
      await ipcRenderer.invoke('fs:writeFile', currentFile, document.getElementById('editor').value);
    }
  }
};

window.saveFileAs = async () => {
  const result = await ipcRenderer.invoke('dialog:saveFile');
  if (!result.canceled) {
    currentFile = result.filePaths[0];
    await ipcRenderer.invoke('fs:writeFile', currentFile, document.getElementById('editor').value);
  }
};

window.closeEditor = () => {
  document.getElementById('editor').value = '';
  currentFile = null;
};

loadDirectory('.');

// --- Terminal ---
const { Terminal } = require('@xterm/xterm');
const { FitAddon } = require('@xterm/addon-fit');
const pty = require('node-pty');

const termContainer = document.getElementById('terminal-container');

const term = new Terminal({
  theme: {
    background: '#1e1e1e', foreground: '#d4d4d4', cursor: '#d4d4d4',
    selectionBackground: '#264f78',
    black: '#000000', red: '#cd3131', green: '#0dbc79', yellow: '#e5e510',
    blue: '#2472c8', magenta: '#bc3fbc', cyan: '#11b8dd', white: '#e5e5e5',
    brightBlack: '#666666', brightRed: '#f14c4c', brightGreen: '#23d18b',
    brightYellow: '#f5f543', brightBlue: '#3b8eea', brightMagenta: '#d670d6',
    brightCyan: '#29b8db', brightWhite: '#e5e5e5',
  },
  fontSize: 13,
  fontFamily: 'Menlo, Monaco, monospace',
  cursorBlink: true,
  allowTransparency: false,
});

const fitAddon = new FitAddon();
term.loadAddon(fitAddon);
term.open(termContainer);

const shell = process.env.SHELL || '/bin/bash';
const ptyProcess = pty.spawn(shell, [], {
  name: 'xterm-256color',
  cols: term.cols,
  rows: term.rows,
  cwd: process.cwd(),
  env: process.env,
});

ptyProcess.onData(data => term.write(data));
term.onData(data => ptyProcess.write(data));
term.onResize(size => ptyProcess.resize(size.cols, size.rows));

window.addEventListener('resize', () => fitAddon.fit());
window.addEventListener('beforeunload', () => ptyProcess.kill());
</script>
</body>
</html>
